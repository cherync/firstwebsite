<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Question</title>
    <link rel="stylesheet" href="style.css">
    <script src="questions2.js"></script>
</head>
<body>

<div class="quiz-container">

    <h3 id="q"></h3>

    <div class="choices-container">
        <div class="choice" id="choice1">
            <div class="choice-button">A</div>
            <div class="choice-image">
                <div id="A"></div>
            </div>
        </div>

        <div class="choice" id="choice2">
            <div class="choice-button">B</div>
            <div class="choice-image">
                <div id="B"></div>
            </div>
        </div>

        <div class="choice" id="choice3">
            <div class="choice-button">C</div>
            <div class="choice-image">
                <div id="C"></div>
            </div>
        </div>

        <div class="choice" id="choice4">
            <div class="choice-button">D</div>
            <div class="choice-image">
                <div id="D"></div>
            </div>
        </div>
    </div>

    <div class="score">
        Score: <span id="o">0%</span>
    </div>

    <div class="quiz-buttons">
        <button onclick="loadQuestion()">Next Question</button>
    </div>

</div>

<script>
let currentQuestion = null;
let chosen = false;
let correct = 0;
let incorrect = 0;

function loadQuestion() {

    // Reset styles
    document.querySelectorAll(".choice").forEach(choice => {
        choice.style.backgroundColor = "";
    });

    // Pick random question
    const randomIndex = Math.floor(Math.random() * x.length);
    currentQuestion = x[randomIndex];

    document.getElementById("q").textContent =
        currentQuestion.question;

    document.getElementById("A").textContent =
        currentQuestion.answers.A;

    document.getElementById("B").textContent =
        currentQuestion.answers.B;

    document.getElementById("C").textContent =
        currentQuestion.answers.C;

    document.getElementById("D").textContent =
        currentQuestion.answers.D;

    chosen = false;
}

function verify(answer) {

    if (chosen) return;

    chosen = true;

    if (currentQuestion.correct === answer) {

        document.getElementById(
            "choice" + (answer.charCodeAt(0) - 64)
        ).style.backgroundColor = "#90EE90";

        correct++;

    } else {

        document.getElementById(
            "choice" + (answer.charCodeAt(0) - 64)
        ).style.backgroundColor = "#FFB6B6";

        const correctAnswer = currentQuestion.correct;

        document.getElementById(
            "choice" + (correctAnswer.charCodeAt(0) - 64)
        ).style.backgroundColor = "#90EE90";

        incorrect++;
    }

    document.getElementById("o").textContent =
        Math.round((correct / (correct + incorrect)) * 100) + "%";
}

document.getElementById("choice1").addEventListener("click", () => verify("A"));
document.getElementById("choice2").addEventListener("click", () => verify("B"));
document.getElementById("choice3").addEventListener("click", () => verify("C"));
document.getElementById("choice4").addEventListener("click", () => verify("D"));

loadQuestion();
</script>

</body>
</html>
